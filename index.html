<title>桃園機場接送・訂車系統</title>
<style>

</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<body>
<div id="root"><div class="loading">載入中…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ----------------------------------------------------------------
   桃園機場接送 — 訂車系統（單檔 index.html 版）
   價格 = 圖片價格 + 200（已內含於下表）
   送機 = 基礎價；接機 = 基礎價 + 100；來回 = 送機 + 接機 − 100
   資料儲存：瀏覽器 localStorage（單一裝置）
------------------------------------------------------------------ */

const C = {
  navy: "#1b2a4e", navy2: "#28395f", orange: "#e8821e", orangeBg: "#fdf1e3",
  sky: "#3f87c9", skyBg: "#eaf4fb", bg: "#f4f6fa", line: "#e3e8f0",
  green: "#2e9e5b", greenBg: "#e7f6ee", red: "#d64545", redBg: "#fcebeb",
  amber: "#d9961f", amberBg: "#fbf1dc", gray: "#64748b", ink: "#1f2937",
};

const PRICE_DATA = {
  "桃園市": [
    { d: ["大園"], p: 600 },
    { d: ["觀音", "中壢", "蘆竹", "桃園"], p: 700 },
    { d: ["八德", "平鎮", "楊梅", "龜山"], p: 800 },
    { d: ["新屋", "復興"], p: 900 },
    { d: ["大溪"], p: 1000 },
    { d: ["龍潭"], p: 1100 },
  ],
  "新北市": [
    { d: ["林口"], p: 800 },
    { d: ["泰山", "三峽", "鶯歌"], p: 900 },
    { d: ["新莊", "樹林", "五股", "土城", "板橋", "蘆洲", "三重", "八里"], p: 1000 },
    { d: ["永和", "中和"], p: 1100 },
    { d: ["汐止", "新店", "淡水"], p: 1200 },
    { d: ["三芝", "深坑"], p: 1300 },
    { d: ["石碇", "石門", "烏來"], p: 1400 },
    { d: ["金山", "平溪", "瑞芳", "坪林", "萬里"], p: 1500 },
    { d: ["雙溪"], p: 1700 },
    { d: ["貢寮"], p: 1800 },
  ],
  "台北市": [
    { d: ["中正", "大同", "中山", "松山", "大安", "萬華", "士林", "信義", "北投"], p: 1100 },
    { d: ["文山", "南港", "內湖"], p: 1200 },
  ],
  "基隆市": [
    { d: ["暖暖", "七堵"], p: 1300 },
    { d: ["仁愛", "安樂"], p: 1400 },
    { d: ["信義", "中正", "中山"], p: 1500 },
  ],
  "宜蘭縣": [
    { d: ["頭城", "礁溪"], p: 2000 },
    { d: ["宜蘭", "壯圍"], p: 2200 },
    { d: ["員山", "羅東", "五結"], p: 2300 },
    { d: ["三星", "冬山"], p: 2500 },
    { d: ["南澳", "大同", "蘇澳"], p: 2700 },
  ],
};
const CITIES = Object.keys(PRICE_DATA);
const DRIVER_PIN = "1357";

function basePriceFor(city, district) {
  const groups = PRICE_DATA[city] || [];
  for (const g of groups) if (g.d.includes(district)) return g.p;
  return null;
}
function finalPrice(base, serviceType) {
  if (base == null) return null;
  if (serviceType === "送機") return base;
  if (serviceType === "接機") return base + 100;
  if (serviceType === "來回") return base * 2;
  return base;
}
const NT = (n) => "NT$ " + Number(n).toLocaleString("en-US");

const STATUS = {
  待確認: { c: C.amber, bg: C.amberBg, label: "待確認" },
  已確認: { c: C.sky, bg: C.skyBg, label: "已確認" },
  前往中: { c: C.orange, bg: C.orangeBg, label: "司機前往中" },
  已完成: { c: C.green, bg: C.greenBg, label: "已完成" },
  已取消: { c: C.red, bg: C.redBg, label: "已取消" },
};

/* ---------------------- localStorage 儲存 ---------------------- */
const SKEY = "ty_airport_bookings";
function loadRaw() {
  try { return JSON.parse(localStorage.getItem(SKEY) || "[]"); } catch (e) { return []; }
}
function saveRaw(arr) {
  try { localStorage.setItem(SKEY, JSON.stringify(arr)); } catch (e) {}
}
function loadAll() {
  return loadRaw().sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
}
function addBooking(rec) { const a = loadRaw(); a.push(rec); saveRaw(a); }
function patchBooking(id, patch) {
  saveRaw(loadRaw().map((b) => (b.id === id ? { ...b, ...patch } : b)));
}

/* ---------------------- 小元件 ---------------------- */
const Badge = ({ status }) => {
  const s = STATUS[status] || STATUS["待確認"];
  return (
    <span style={{ background: s.bg, color: s.c, fontSize: 12, fontWeight: 600, padding: "3px 10px", borderRadius: 20, whiteSpace: "nowrap" }}>
      {s.label}
    </span>
  );
};
const Field = ({ label, children, req }) => (
  <label style={{ display: "block", marginBottom: 14 }}>
    <span style={{ display: "block", fontSize: 13, color: C.gray, marginBottom: 6, fontWeight: 600 }}>
      {label} {req && <span style={{ color: C.red }}>*</span>}
    </span>
    {children}
  </label>
);
const inputStyle = {
  width: "100%", padding: "10px 12px", border: "1px solid " + C.line,
  borderRadius: 10, fontSize: 15, boxSizing: "border-box", background: "#fff", color: C.ink,
};
const Btn = ({ children, color, ghost, onClick }) => (
  <button onClick={onClick} style={{
    padding: "9px 16px", borderRadius: 9, fontSize: 14, fontWeight: 700, cursor: "pointer",
    border: ghost ? "1px solid " + color : "none",
    background: ghost ? "#fff" : color, color: ghost ? color : "#fff",
  }}>{children}</button>
);
const Empty = () => <p style={{ color: C.gray, fontSize: 14, textAlign: "center", padding: 24 }}>尚無資料</p>;

/* ======================== 訂車表單 ======================== */
function BookingForm({ onBooked }) {
  const blank = { name: "", phone: "", serviceType: "送機", city: "桃園市", district: "", when: "", flight: "", addr: "", pax: "1", note: "" };
  const [form, setForm] = useState(blank);
  const [done, setDone] = useState(null);

  const districts = useMemo(() => {
    const set = [];
    (PRICE_DATA[form.city] || []).forEach((g) => g.d.forEach((x) => set.push(x)));
    return [...new Set(set)];
  }, [form.city]);

  const base = basePriceFor(form.city, form.district);
  const price = finalPrice(base, form.serviceType);
  const ok = form.name && form.phone && form.district && form.when && price != null;
  const set = (k, v) => setForm((f) => { const n = { ...f, [k]: v }; if (k === "city") n.district = ""; return n; });

  const submit = () => {
    if (!ok) return;
    const id = "bk_" + Date.now() + Math.random().toString(36).slice(2, 6);
    const rec = { id, ...form, base, price, status: "待確認", createdAt: Date.now() };
    addBooking(rec);
    setDone(rec);
    onBooked && onBooked();
  };

  if (done) {
    return (
      <div style={{ background: "#fff", borderRadius: 16, padding: 28, border: "1px solid " + C.line, textAlign: "center" }}>
        <div style={{ width: 56, height: 56, borderRadius: "50%", background: C.greenBg, color: C.green, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 30, margin: "0 auto 14px" }}>✓</div>
        <h3 style={{ margin: "0 0 6px", color: C.navy }}>預約成功！</h3>
        <p style={{ color: C.gray, fontSize: 14, margin: "0 0 18px" }}>司機會盡快與您確認行程</p>
        <div style={{ background: C.bg, borderRadius: 12, padding: 16, textAlign: "left", fontSize: 14, lineHeight: 1.9 }}>
          <div><b>姓名：</b>{done.name}　<b>電話：</b>{done.phone}</div>
          <div><b>類型：</b>{done.serviceType}</div>
          <div><b>地點：</b>桃園機場 ⇄ {done.city} {done.district}</div>
          <div><b>時間：</b>{done.when.replace("T", " ")}</div>
          <div style={{ marginTop: 8, fontSize: 18, color: C.orange, fontWeight: 700 }}>應付車資：{NT(done.price)}</div>
        </div>
        <p style={{ fontSize: 12, color: C.gray, marginTop: 14 }}>請記下您的電話，可至「查詢訂單」追蹤司機狀態。</p>
        <button onClick={() => { setDone(null); setForm(blank); }}
          style={{ marginTop: 16, padding: "11px 26px", background: C.navy, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
          再預約一筆
        </button>
      </div>
    );
  }

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: 24, border: "1px solid " + C.line }}>
      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        {["送機", "接機", "來回"].map((t) => (
          <button key={t} onClick={() => set("serviceType", t)}
            style={{
              flex: 1, padding: "12px 0", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer",
              border: form.serviceType === t ? "2px solid " + C.orange : "1px solid " + C.line,
              background: form.serviceType === t ? C.orangeBg : "#fff",
              color: form.serviceType === t ? C.orange : C.gray,
            }}>{t}</button>
        ))}
      </div>
      <div style={{ fontSize: 12, color: C.gray, marginBottom: 18, background: C.skyBg, padding: "8px 12px", borderRadius: 8 }}>
        {form.serviceType === "送機" && "🛫 從您的所在地送往桃園機場"}
        {form.serviceType === "接機" && "🛬 至桃園機場接您回家（接機 +100）"}
        {form.serviceType === "來回" && "🔁 接送一起預約，已折抵 100 元"}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="姓名" req><input style={inputStyle} value={form.name} onChange={(e) => set("name", e.target.value)} placeholder="王先生" /></Field>
        <Field label="聯絡電話" req><input style={inputStyle} value={form.phone} onChange={(e) => set("phone", e.target.value)} placeholder="0912-345-678" /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="縣市" req>
          <select style={inputStyle} value={form.city} onChange={(e) => set("city", e.target.value)}>
            {CITIES.map((c) => <option key={c}>{c}</option>)}
          </select>
        </Field>
        <Field label="地區" req>
          <select style={inputStyle} value={form.district} onChange={(e) => set("district", e.target.value)}>
            <option value="">請選擇地區</option>
            {districts.map((d) => <option key={d}>{d}</option>)}
          </select>
        </Field>
      </div>
      <Field label={form.serviceType === "送機" ? "上車地址" : "下車地址"}>
        <input style={inputStyle} value={form.addr} onChange={(e) => set("addr", e.target.value)} placeholder="詳細地址（選填）" />
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="搭乘時間" req><input type="datetime-local" style={inputStyle} value={form.when} onChange={(e) => set("when", e.target.value)} /></Field>
        <Field label="航班編號"><input style={inputStyle} value={form.flight} onChange={(e) => set("flight", e.target.value)} placeholder="如 BR225（選填）" /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="乘客人數">
          <select style={inputStyle} value={form.pax} onChange={(e) => set("pax", e.target.value)}>
            {[1, 2, 3, 4].map((n) => <option key={n} value={n}>{n} 人</option>)}
          </select>
        </Field>
        <Field label="備註"><input style={inputStyle} value={form.note} onChange={(e) => set("note", e.target.value)} placeholder="行李 / 兒童座椅…" /></Field>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 8, padding: "16px 18px", background: C.navy, borderRadius: 12 }}>
        <div>
          <div style={{ fontSize: 12, color: "#aab8d4" }}>預估車資（舒適五人座）</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: "#fff", letterSpacing: 0.5 }}>
            {price != null ? NT(price) : "請選擇地區"}
          </div>
        </div>
        <button onClick={submit} disabled={!ok}
          style={{
            padding: "13px 28px", background: ok ? C.orange : "#5a6788", color: "#fff", border: "none",
            borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: ok ? "pointer" : "not-allowed",
          }}>確認預約</button>
      </div>
      <p style={{ fontSize: 11, color: C.gray, marginTop: 10, textAlign: "center" }}>
        ※ 報價皆為舒適五人座，其他車型或區域請洽客服 LINE：@car178
      </p>
    </div>
  );
}

/* ======================== 查詢訂單 ======================== */
function Lookup({ all }) {
  const [phone, setPhone] = useState("");
  const dig = (s) => (s || "").replace(/\D/g, "");
  const found = phone.length >= 4 ? all.filter((b) => dig(b.phone) === dig(phone)) : [];
  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: 24, border: "1px solid " + C.line }}>
      <Field label="輸入您預約時的電話">
        <input style={inputStyle} value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="0912-345-678" />
      </Field>
      {phone.length >= 4 && found.length === 0 && (
        <p style={{ color: C.gray, fontSize: 14, textAlign: "center", padding: 20 }}>查無此電話的訂單。</p>
      )}
      {found.map((b) => {
        const s = STATUS[b.status];
        return (
          <div key={b.id} style={{ border: "1px solid " + C.line, borderLeft: "4px solid " + s.c, borderRadius: 10, padding: 16, marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <b style={{ color: C.navy }}>{b.serviceType}・桃園機場 ⇄ {b.city}{b.district}</b>
              <Badge status={b.status} />
            </div>
            <div style={{ fontSize: 14, color: C.gray, lineHeight: 1.8 }}>
              時間：{b.when.replace("T", " ")}<br />
              車資：<b style={{ color: C.orange }}>{NT(b.price)}</b>
            </div>
            {b.status === "前往中" && <div style={{ marginTop: 8, background: C.orangeBg, color: C.orange, padding: "8px 12px", borderRadius: 8, fontSize: 14, fontWeight: 600 }}>🚗 司機已出發，正在前往中！</div>}
            {b.status === "已確認" && <div style={{ marginTop: 8, background: C.skyBg, color: C.sky, padding: "8px 12px", borderRadius: 8, fontSize: 14, fontWeight: 600 }}>✅ 司機已接單，請準時等候</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ======================== 司機後台 ======================== */
function Driver({ all, reload }) {
  const [filter, setFilter] = useState("全部");
  const update = (b, status) => { patchBooking(b.id, { status }); reload(); };
  const counts = useMemo(() => {
    const c = { 全部: all.length, 待確認: 0, 已確認: 0, 前往中: 0, 已完成: 0, 已取消: 0 };
    all.forEach((b) => { c[b.status] = (c[b.status] || 0) + 1; });
    return c;
  }, [all]);
  const list = filter === "全部" ? all : all.filter((b) => b.status === filter);

  return (
    <div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
        {["全部", "待確認", "已確認", "前往中", "已完成", "已取消"].map((f) => (
          <button key={f} onClick={() => setFilter(f)}
            style={{
              padding: "7px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer",
              border: filter === f ? "1px solid " + C.navy : "1px solid " + C.line,
              background: filter === f ? C.navy : "#fff", color: filter === f ? "#fff" : C.gray,
            }}>{f} {counts[f] || 0}</button>
        ))}
      </div>

      {list.length === 0 && (
        <div style={{ background: "#fff", borderRadius: 14, padding: 40, textAlign: "center", color: C.gray, border: "1px solid " + C.line }}>
          目前沒有「{filter}」的行程。
        </div>
      )}

      {list.map((b) => {
        const s = STATUS[b.status];
        return (
          <div key={b.id} style={{ background: "#fff", borderRadius: 14, padding: 18, marginBottom: 14, border: "1px solid " + C.line, borderLeft: "5px solid " + s.c }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
              <div>
                <div style={{ fontSize: 17, fontWeight: 700, color: C.navy }}>{b.serviceType}　{b.name}</div>
                <a href={"tel:" + b.phone} style={{ fontSize: 14, color: C.sky, textDecoration: "none" }}>📞 {b.phone}</a>
              </div>
              <Badge status={b.status} />
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 16px", fontSize: 14, color: C.ink, background: C.bg, borderRadius: 10, padding: "12px 14px", marginBottom: 12 }}>
              <div>🗺️ 桃園機場 ⇄ <b>{b.city}{b.district}</b></div>
              <div>🕐 {b.when.replace("T", " ")}</div>
              {b.addr && <div>📍 {b.addr}</div>}
              {b.flight && <div>✈️ 航班 {b.flight}</div>}
              <div>👤 {b.pax} 人</div>
              {b.note && <div>📝 {b.note}</div>}
            </div>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
              <div style={{ fontSize: 13, color: C.gray }}>
                應收車資 <span style={{ fontSize: 22, fontWeight: 800, color: C.orange, marginLeft: 4 }}>{NT(b.price)}</span>
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {b.status === "待確認" && (<>
                  <Btn color={C.green} onClick={() => update(b, "已確認")}>✓ 確認接單</Btn>
                  <Btn color={C.red} ghost onClick={() => update(b, "已取消")}>取消</Btn>
                </>)}
                {b.status === "已確認" && (<>
                  <Btn color={C.orange} onClick={() => update(b, "前往中")}>🚗 通知客人出發中</Btn>
                  <Btn color={C.green} ghost onClick={() => update(b, "已完成")}>完成</Btn>
                  <Btn color={C.red} ghost onClick={() => update(b, "已取消")}>取消</Btn>
                </>)}
                {b.status === "前往中" && (<>
                  <Btn color={C.green} onClick={() => update(b, "已完成")}>✓ 行程完成</Btn>
                  <Btn color={C.red} ghost onClick={() => update(b, "已取消")}>取消</Btn>
                </>)}
                {(b.status === "已完成" || b.status === "已取消") && (
                  <Btn color={C.gray} ghost onClick={() => update(b, "待確認")}>↩ 重新開啟</Btn>
                )}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ======================== 統計報表 ======================== */
function Donut({ data, colors }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const R = 40, CIRC = 2 * Math.PI * R;
  let acc = 0;
  return (
    <svg width="160" height="160" viewBox="0 0 160 160">
      <g transform="rotate(-90 80 80)">
        {data.map((d, i) => {
          const len = (d.value / total) * CIRC;
          const seg = (
            <circle key={i} cx="80" cy="80" r={R} fill="none" stroke={colors[i % colors.length]}
              strokeWidth="22" strokeDasharray={len + " " + (CIRC - len)} strokeDashoffset={-acc} />
          );
          acc += len;
          return seg;
        })}
      </g>
    </svg>
  );
}

function Stats({ all }) {
  const active = all.filter((b) => b.status !== "已取消");
  const earned = all.filter((b) => b.status === "已完成").reduce((s, b) => s + b.price, 0);
  const pending = active.filter((b) => b.status !== "已完成").reduce((s, b) => s + b.price, 0);
  const today = new Date().toISOString().slice(0, 10);
  const todayTrips = all.filter((b) => (b.when || "").slice(0, 10) === today && b.status !== "已取消");

  const byCity = useMemo(() => {
    const m = {};
    active.forEach((b) => { m[b.city] = (m[b.city] || 0) + b.price; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [all]);
  const maxCity = Math.max(1, ...byCity.map((x) => x.value));

  const byType = useMemo(() => {
    const m = { 送機: 0, 接機: 0, 來回: 0 };
    active.forEach((b) => { m[b.serviceType] = (m[b.serviceType] || 0) + 1; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).filter((x) => x.value > 0);
  }, [all]);

  const PIE = [C.orange, C.sky, C.green];
  const metrics = [
    { label: "總行程數", v: all.length, c: C.navy },
    { label: "已完成", v: all.filter((b) => b.status === "已完成").length, c: C.green },
    { label: "進行中 / 待辦", v: active.filter((b) => b.status !== "已完成").length, c: C.amber },
    { label: "今日行程", v: todayTrips.length, c: C.sky },
  ];

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
        <div style={{ background: C.navy, borderRadius: 14, padding: "18px 20px", color: "#fff" }}>
          <div style={{ fontSize: 13, color: "#aab8d4" }}>已完成營收</div>
          <div style={{ fontSize: 30, fontWeight: 800 }}>{NT(earned)}</div>
        </div>
        <div style={{ background: C.orange, borderRadius: 14, padding: "18px 20px", color: "#fff" }}>
          <div style={{ fontSize: 13, color: "#ffe6c9" }}>預計待收（含進行中）</div>
          <div style={{ fontSize: 30, fontWeight: 800 }}>{NT(pending)}</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 18 }}>
        {metrics.map((m) => (
          <div key={m.label} style={{ background: "#fff", borderRadius: 12, padding: "14px 8px", border: "1px solid " + C.line, textAlign: "center" }}>
            <div style={{ fontSize: 26, fontWeight: 800, color: m.c }}>{m.v}</div>
            <div style={{ fontSize: 12, color: C.gray, marginTop: 2 }}>{m.label}</div>
          </div>
        ))}
      </div>

      <div style={{ background: "#fff", borderRadius: 14, padding: 18, border: "1px solid " + C.line, marginBottom: 16 }}>
        <h4 style={{ margin: "0 0 14px", color: C.navy, fontSize: 15 }}>各區域營收（不含已取消）</h4>
        {byCity.length === 0 ? <Empty /> : byCity.map((c) => (
          <div key={c.name} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <div style={{ width: 56, fontSize: 13, color: C.ink, textAlign: "right" }}>{c.name}</div>
            <div style={{ flex: 1, background: C.bg, borderRadius: 6, height: 22, overflow: "hidden" }}>
              <div style={{ width: (c.value / maxCity * 100) + "%", height: "100%", background: C.sky, borderRadius: 6 }} />
            </div>
            <div style={{ width: 84, fontSize: 13, fontWeight: 700, color: C.navy, textAlign: "right" }}>{NT(c.value)}</div>
          </div>
        ))}
      </div>

      <div style={{ background: "#fff", borderRadius: 14, padding: 18, border: "1px solid " + C.line }}>
        <h4 style={{ margin: "0 0 12px", color: C.navy, fontSize: 15 }}>服務類型佔比</h4>
        {byType.length === 0 ? <Empty /> : (
          <div style={{ display: "flex", alignItems: "center", gap: 24, flexWrap: "wrap" }}>
            <Donut data={byType} colors={PIE} />
            <div>
              {byType.map((e, i) => (
                <div key={e.name} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, fontSize: 14 }}>
                  <span style={{ width: 12, height: 12, borderRadius: 3, background: PIE[i % 3], display: "inline-block" }} />
                  <b>{e.name}</b>　{e.value} 筆
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ======================== 主程式 ======================== */
function App() {
  const [tab, setTab] = useState("book");
  const [all, setAll] = useState([]);
  const [unlocked, setUnlocked] = useState(false);
  const [pin, setPin] = useState("");
  const [pinErr, setPinErr] = useState(false);

  const reload = () => setAll(loadAll());
  useEffect(() => { reload(); }, []);
  useEffect(() => { if (tab === "driver" || tab === "stats") reload(); }, [tab]);

  const TABS = [
    { k: "book", t: "🚖 乘客訂車" },
    { k: "lookup", t: "🔍 查詢訂單" },
    { k: "driver", t: "🧑‍✈️ 司機後台" },
    { k: "stats", t: "📊 統計報表" },
  ];
  const tryUnlock = () => { if (pin === DRIVER_PIN) { setUnlocked(true); setPinErr(false); } else setPinErr(true); };

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.ink }}>
      <div style={{ background: C.navy, padding: "20px 0 0" }}>
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "0 18px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <span style={{ background: C.orange, color: "#fff", fontWeight: 800, padding: "4px 10px", borderRadius: 8, fontSize: 14 }}>✈ TAOYUAN</span>
            <h1 style={{ color: "#fff", fontSize: 22, margin: 0, fontWeight: 800 }}>桃園機場接送・訂車系統</h1>
          </div>
          <p style={{ color: "#aab8d4", fontSize: 13, margin: "6px 0 16px" }}>LINE 客服：@car178　｜　舒適五人座專業接送</p>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {TABS.map((x) => (
              <button key={x.k} onClick={() => setTab(x.k)}
                style={{
                  padding: "11px 14px", border: "none", cursor: "pointer", fontSize: 14, fontWeight: 700,
                  borderRadius: "10px 10px 0 0",
                  background: tab === x.k ? C.bg : "transparent",
                  color: tab === x.k ? C.navy : "#cdd6e8",
                }}>{x.t}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "22px 18px 60px" }}>
        {tab === "book" && <BookingForm onBooked={reload} />}
        {tab === "lookup" && <Lookup all={all} />}

        {(tab === "driver" || tab === "stats") && !unlocked && (
          <div style={{ background: "#fff", borderRadius: 16, padding: 32, border: "1px solid " + C.line, maxWidth: 360, margin: "20px auto", textAlign: "center" }}>
            <div style={{ fontSize: 34, marginBottom: 6 }}>🔒</div>
            <h3 style={{ margin: "0 0 4px", color: C.navy }}>司機後台</h3>
            <p style={{ color: C.gray, fontSize: 13, margin: "0 0 18px" }}>請輸入司機密碼進入</p>
            <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && tryUnlock()}
              placeholder="預設密碼 1357" style={{ ...inputStyle, textAlign: "center", letterSpacing: 4, fontSize: 18 }} />
            {pinErr && <p style={{ color: C.red, fontSize: 13, margin: "8px 0 0" }}>密碼錯誤，請再試一次</p>}
            <button onClick={tryUnlock} style={{ marginTop: 14, width: "100%", padding: 12, background: C.navy, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>進入後台</button>
          </div>
        )}

        {tab === "driver" && unlocked && <Driver all={all} reload={reload} />}
        {tab === "stats" && unlocked && <Stats all={all} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
