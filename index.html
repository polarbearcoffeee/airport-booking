<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>桃園機場接送・訂車系統（多司機共用版）</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; }
  input, select, button, textarea { font-family: inherit; }
  #root { font-family: 'PingFang TC','Microsoft JhengHei',system-ui,sans-serif; }
  .loading { padding: 60px 20px; text-align: center; color: #64748b; font-family: system-ui; line-height: 1.8; }
</style>

     ① Firebase 設定：到 Firebase 主控台建立專案後，把你的設定貼進來

  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAOHDCmnhV4djJnaVwhp1P3Ucand_DJ4M8",
  authDomain: "airport-car.firebaseapp.com",
  projectId: "airport-car",
  storageBucket: "airport-car.firebasestorage.app",
  messagingSenderId: "497915579586",
  appId: "1:497915579586:web:c03ae3f86abfd5a01f7f5b"
};

try {

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="loading">連線中…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const C = {
  navy: "#1b2a4e", orange: "#e8821e", orangeBg: "#fdf1e3",
  sky: "#3f87c9", skyBg: "#eaf4fb", bg: "#f4f6fa", line: "#e3e8f0",
  green: "#2e9e5b", greenBg: "#e7f6ee", red: "#d64545", redBg: "#fcebeb",
  amber: "#d9961f", amberBg: "#fbf1dc", gray: "#64748b", ink: "#1f2937",
};

const PRICE_DATA = {
  "桃園市": [
    { d: ["大園"], p: 600 }, { d: ["觀音", "中壢", "蘆竹", "桃園"], p: 700 },
    { d: ["八德", "平鎮", "楊梅", "龜山"], p: 800 }, { d: ["新屋", "復興"], p: 900 },
    { d: ["大溪"], p: 1000 }, { d: ["龍潭"], p: 1100 },
  ],
  "新北市": [
    { d: ["林口"], p: 800 }, { d: ["泰山", "三峽", "鶯歌"], p: 900 },
    { d: ["新莊", "樹林", "五股", "土城", "板橋", "蘆洲", "三重", "八里"], p: 1000 },
    { d: ["永和", "中和"], p: 1100 }, { d: ["汐止", "新店", "淡水"], p: 1200 },
    { d: ["三芝", "深坑"], p: 1300 }, { d: ["石碇", "石門", "烏來"], p: 1400 },
    { d: ["金山", "平溪", "瑞芳", "坪林", "萬里"], p: 1500 },
    { d: ["雙溪"], p: 1700 }, { d: ["貢寮"], p: 1800 },
  ],
  "台北市": [
    { d: ["中正", "大同", "中山", "松山", "大安", "萬華", "士林", "信義", "北投"], p: 1100 },
    { d: ["文山", "南港", "內湖"], p: 1200 },
  ],
  "基隆市": [
    { d: ["暖暖", "七堵"], p: 1300 }, { d: ["仁愛", "安樂"], p: 1400 },
    { d: ["信義", "中正", "中山"], p: 1500 },
  ],
  "宜蘭縣": [
    { d: ["頭城", "礁溪"], p: 2000 }, { d: ["宜蘭", "壯圍"], p: 2200 },
    { d: ["員山", "羅東", "五結"], p: 2300 }, { d: ["三星", "冬山"], p: 2500 },
    { d: ["南澳", "大同", "蘇澳"], p: 2700 },
  ],
};
const CITIES = Object.keys(PRICE_DATA);
const DEFAULT_PIN = "1357";

function basePriceFor(city, district) {
  for (const g of (PRICE_DATA[city] || [])) if (g.d.includes(district)) return g.p;
  return null;
}
function finalPrice(base, serviceType) {
  if (base == null) return null;
  if (serviceType === "送機") return base;
  if (serviceType === "接機") return base + 100;
  if (serviceType === "來回") return base * 2;
  return base;
}
const NT = (n) => "NT$ " + Number(n).toLocaleString("en-US");
const _p2 = (n) => String(n).padStart(2, "0");
const fmtDate = (ts) => { if (!ts) return "—"; const d = new Date(ts); return d.getFullYear() + "/" + _p2(d.getMonth() + 1) + "/" + _p2(d.getDate()); };
const fmtTime = (ts) => { if (!ts) return "—"; const d = new Date(ts); return fmtDate(ts) + " " + _p2(d.getHours()) + ":" + _p2(d.getMinutes()); };

const STATUS = {
  待確認: { c: C.amber, bg: C.amberBg, label: "待確認" },
  已確認: { c: C.sky, bg: C.skyBg, label: "已確認" },
  前往中: { c: C.orange, bg: C.orangeBg, label: "司機前往中" },
  已完成: { c: C.green, bg: C.greenBg, label: "已完成" },
  已取消: { c: C.red, bg: C.redBg, label: "已取消" },
};

/* ---------------------- Firebase 資料層 ---------------------- */
function subBookings(cb) {
  const f = window.fb;
  return f.onSnapshot(
    f.query(f.collection(f.db, "bookings"), f.orderBy("createdAt", "desc")),
    (s) => cb(s.docs.map((d) => ({ id: d.id, ...d.data() })))
  );
}
function subSettings(cb) {
  const f = window.fb;
  return f.onSnapshot(f.doc(f.db, "settings", "app"),
    (s) => cb(s.exists() ? s.data() : { pin: DEFAULT_PIN }));
}
async function addBooking(rec) { const f = window.fb; await f.addDoc(f.collection(f.db, "bookings"), rec); }
async function patchBooking(id, patch) { const f = window.fb; await f.updateDoc(f.doc(f.db, "bookings", id), patch); }
async function savePin(p) { const f = window.fb; await f.setDoc(f.doc(f.db, "settings", "app"), { pin: p }, { merge: true }); }
function subCloseouts(cb) {
  const f = window.fb;
  return f.onSnapshot(
    f.query(f.collection(f.db, "closeouts"), f.orderBy("closedAt", "desc")),
    (s) => cb(s.docs.map((d) => ({ id: d.id, ...d.data() })))
  );
}
async function addCloseout(rec) { const f = window.fb; const ref = await f.addDoc(f.collection(f.db, "closeouts"), rec); return ref.id; }
async function saveShift(openAt) { const f = window.fb; await f.setDoc(f.doc(f.db, "settings", "app"), { shiftOpenAt: openAt }, { merge: true }); }

/* ---------------------- 小元件 ---------------------- */
const Badge = ({ status }) => {
  const s = STATUS[status] || STATUS["待確認"];
  return <span style={{ background: s.bg, color: s.c, fontSize: 12, fontWeight: 600, padding: "3px 10px", borderRadius: 20, whiteSpace: "nowrap" }}>{s.label}</span>;
};
const Field = ({ label, children, req }) => (
  <label style={{ display: "block", marginBottom: 14 }}>
    <span style={{ display: "block", fontSize: 13, color: C.gray, marginBottom: 6, fontWeight: 600 }}>
      {label} {req && <span style={{ color: C.red }}>*</span>}
    </span>{children}
  </label>
);
const inputStyle = { width: "100%", padding: "10px 12px", border: "1px solid " + C.line, borderRadius: 10, fontSize: 15, boxSizing: "border-box", background: "#fff", color: C.ink };
const Btn = ({ children, color, ghost, onClick }) => (
  <button onClick={onClick} style={{ padding: "9px 16px", borderRadius: 9, fontSize: 14, fontWeight: 700, cursor: "pointer", border: ghost ? "1px solid " + color : "none", background: ghost ? "#fff" : color, color: ghost ? color : "#fff" }}>{children}</button>
);
const Empty = () => <p style={{ color: C.gray, fontSize: 14, textAlign: "center", padding: 24 }}>尚無資料</p>;

/* ======================== 訂車表單 ======================== */
function BookingForm() {
  const blank = { name: "", phone: "", serviceType: "送機", city: "桃園市", district: "", when: "", flight: "", addr: "", pax: "1", note: "" };
  const [form, setForm] = useState(blank);
  const [done, setDone] = useState(null);
  const [busy, setBusy] = useState(false);

  const districts = useMemo(() => {
    const set = [];
    (PRICE_DATA[form.city] || []).forEach((g) => g.d.forEach((x) => set.push(x)));
    return [...new Set(set)];
  }, [form.city]);

  const base = basePriceFor(form.city, form.district);
  const price = finalPrice(base, form.serviceType);
  const ok = form.name && form.phone && form.district && form.when && price != null;
  const set = (k, v) => setForm((f) => { const n = { ...f, [k]: v }; if (k === "city") n.district = ""; return n; });

  const submit = async () => {
    if (!ok || busy) return;
    setBusy(true);
    const rec = { ...form, base, price, status: "待確認", createdAt: Date.now() };
    try { await addBooking(rec); setDone({ ...rec }); }
    catch (e) { alert("送出失敗，請檢查網路或稍後再試。"); }
    setBusy(false);
  };

  if (done) {
    return (
      <div style={{ background: "#fff", borderRadius: 16, padding: 28, border: "1px solid " + C.line, textAlign: "center" }}>
        <div style={{ width: 56, height: 56, borderRadius: "50%", background: C.greenBg, color: C.green, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 30, margin: "0 auto 14px" }}>✓</div>
        <h3 style={{ margin: "0 0 6px", color: C.navy }}>預約成功！</h3>
        <p style={{ color: C.gray, fontSize: 14, margin: "0 0 18px" }}>司機會盡快與您確認行程</p>
        <div style={{ background: C.bg, borderRadius: 12, padding: 16, textAlign: "left", fontSize: 14, lineHeight: 1.9 }}>
          <div><b>姓名：</b>{done.name}　<b>電話：</b>{done.phone}</div>
          <div><b>類型：</b>{done.serviceType}</div>
          <div><b>地點：</b>桃園機場 ⇄ {done.city} {done.district}</div>
          <div><b>時間：</b>{done.when.replace("T", " ")}</div>
          <div style={{ marginTop: 8, fontSize: 18, color: C.orange, fontWeight: 700 }}>應付車資：{NT(done.price)}</div>
        </div>
        <p style={{ fontSize: 12, color: C.gray, marginTop: 14 }}>請記下您的電話，可至「查詢訂單」追蹤司機狀態。</p>
        <button onClick={() => { setDone(null); setForm(blank); }} style={{ marginTop: 16, padding: "11px 26px", background: C.navy, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 600, cursor: "pointer" }}>再預約一筆</button>
      </div>
    );
  }

  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: 24, border: "1px solid " + C.line }}>
      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        {["送機", "接機", "來回"].map((t) => (
          <button key={t} onClick={() => set("serviceType", t)} style={{ flex: 1, padding: "12px 0", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer", border: form.serviceType === t ? "2px solid " + C.orange : "1px solid " + C.line, background: form.serviceType === t ? C.orangeBg : "#fff", color: form.serviceType === t ? C.orange : C.gray }}>{t}</button>
        ))}
      </div>
      <div style={{ fontSize: 12, color: C.gray, marginBottom: 18, background: C.skyBg, padding: "8px 12px", borderRadius: 8 }}>
        {form.serviceType === "送機" && "🛫 從您的所在地送往桃園機場"}
        {form.serviceType === "接機" && "🛬 至桃園機場接您回家（接機 +100）"}
        {form.serviceType === "來回" && "🔁 接送一起預約，已折抵 100 元"}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="姓名" req><input style={inputStyle} value={form.name} onChange={(e) => set("name", e.target.value)} placeholder="王先生" /></Field>
        <Field label="聯絡電話" req><input style={inputStyle} value={form.phone} onChange={(e) => set("phone", e.target.value)} placeholder="0912-345-678" /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="縣市" req><select style={inputStyle} value={form.city} onChange={(e) => set("city", e.target.value)}>{CITIES.map((c) => <option key={c}>{c}</option>)}</select></Field>
        <Field label="地區" req><select style={inputStyle} value={form.district} onChange={(e) => set("district", e.target.value)}><option value="">請選擇地區</option>{districts.map((d) => <option key={d}>{d}</option>)}</select></Field>
      </div>
      <Field label={form.serviceType === "送機" ? "上車地址" : "下車地址"}><input style={inputStyle} value={form.addr} onChange={(e) => set("addr", e.target.value)} placeholder="詳細地址（選填）" /></Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="搭乘時間" req><input type="datetime-local" style={inputStyle} value={form.when} onChange={(e) => set("when", e.target.value)} /></Field>
        <Field label="航班編號"><input style={inputStyle} value={form.flight} onChange={(e) => set("flight", e.target.value)} placeholder="如 BR225（選填）" /></Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Field label="乘客人數"><select style={inputStyle} value={form.pax} onChange={(e) => set("pax", e.target.value)}>{[1, 2, 3, 4].map((n) => <option key={n} value={n}>{n} 人</option>)}</select></Field>
        <Field label="備註"><input style={inputStyle} value={form.note} onChange={(e) => set("note", e.target.value)} placeholder="行李 / 兒童座椅…" /></Field>
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 8, padding: "16px 18px", background: C.navy, borderRadius: 12 }}>
        <div>
          <div style={{ fontSize: 12, color: "#aab8d4" }}>預估車資（舒適五人座）</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: "#fff", letterSpacing: 0.5 }}>{price != null ? NT(price) : "請選擇地區"}</div>
        </div>
        <button onClick={submit} disabled={!ok || busy} style={{ padding: "13px 28px", background: ok ? C.orange : "#5a6788", color: "#fff", border: "none", borderRadius: 10, fontSize: 16, fontWeight: 700, cursor: ok ? "pointer" : "not-allowed" }}>{busy ? "送出中…" : "確認預約"}</button>
      </div>
      <p style={{ fontSize: 11, color: C.gray, marginTop: 10, textAlign: "center" }}>※ 報價皆為舒適五人座，其他車型或區域請洽客服 LINE：@car178</p>
    </div>
  );
}

/* ======================== 查詢訂單 ======================== */
function Lookup({ all }) {
  const [phone, setPhone] = useState("");
  const dig = (s) => (s || "").replace(/\D/g, "");
  const found = phone.length >= 4 ? all.filter((b) => dig(b.phone) === dig(phone)) : [];
  return (
    <div style={{ background: "#fff", borderRadius: 16, padding: 24, border: "1px solid " + C.line }}>
      <Field label="輸入您預約時的電話"><input style={inputStyle} value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="0912-345-678" /></Field>
      {phone.length >= 4 && found.length === 0 && <p style={{ color: C.gray, fontSize: 14, textAlign: "center", padding: 20 }}>查無此電話的訂單。</p>}
      {found.map((b) => {
        const s = STATUS[b.status];
        return (
          <div key={b.id} style={{ border: "1px solid " + C.line, borderLeft: "4px solid " + s.c, borderRadius: 10, padding: 16, marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <b style={{ color: C.navy }}>{b.serviceType}・桃園機場 ⇄ {b.city}{b.district}</b><Badge status={b.status} />
            </div>
            <div style={{ fontSize: 14, color: C.gray, lineHeight: 1.8 }}>時間：{b.when.replace("T", " ")}<br />車資：<b style={{ color: C.orange }}>{NT(b.price)}</b></div>
            {b.status === "前往中" && <div style={{ marginTop: 8, background: C.orangeBg, color: C.orange, padding: "8px 12px", borderRadius: 8, fontSize: 14, fontWeight: 600 }}>🚗 司機已出發，正在前往中！</div>}
            {b.status === "已確認" && <div style={{ marginTop: 8, background: C.skyBg, color: C.sky, padding: "8px 12px", borderRadius: 8, fontSize: 14, fontWeight: 600 }}>✅ 司機已接單，請準時等候</div>}
          </div>
        );
      })}
    </div>
  );
}

/* ======================== 後台設定（改 PIN） ======================== */
function PinSetting({ currentPin }) {
  const [open, setOpen] = useState(false);
  const [a, setA] = useState(""); const [b, setB] = useState("");
  const [msg, setMsg] = useState(null); const [busy, setBusy] = useState(false);
  const save = async () => {
    if (a.length < 3) return setMsg(["err", "新密碼至少 3 碼"]);
    if (a !== b) return setMsg(["err", "兩次輸入不一致"]);
    setBusy(true);
    try { await savePin(a); setMsg(["ok", "密碼已更新，所有司機共用此新密碼"]); setA(""); setB(""); }
    catch (e) { setMsg(["err", "更新失敗，請檢查網路"]); }
    setBusy(false);
  };
  return (
    <div style={{ background: "#fff", border: "1px solid " + C.line, borderRadius: 12, marginBottom: 16, overflow: "hidden" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", textAlign: "left", padding: "12px 16px", background: "#fff", border: "none", cursor: "pointer", fontSize: 14, fontWeight: 700, color: C.navy, display: "flex", justifyContent: "space-between" }}>
        <span>⚙️ 後台設定 ・ 變更登入密碼</span><span style={{ color: C.gray }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div style={{ padding: "4px 16px 18px" }}>
          <p style={{ fontSize: 13, color: C.gray, margin: "0 0 12px" }}>目前密碼：<b style={{ color: C.ink }}>{currentPin}</b>（所有司機共用同一組）</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="新密碼"><input type="text" style={inputStyle} value={a} onChange={(e) => setA(e.target.value)} placeholder="至少 3 碼" /></Field>
            <Field label="再次輸入"><input type="text" style={inputStyle} value={b} onChange={(e) => setB(e.target.value)} placeholder="再輸入一次" /></Field>
          </div>
          {msg && <p style={{ fontSize: 13, color: msg[0] === "ok" ? C.green : C.red, margin: "0 0 10px" }}>{msg[1]}</p>}
          <Btn color={C.navy} onClick={busy ? () => {} : save}>{busy ? "儲存中…" : "更新密碼"}</Btn>
        </div>
      )}
    </div>
  );
}

/* ======================== 司機後台 ======================== */
function Driver({ all, currentPin }) {
  const [filter, setFilter] = useState("全部");
  const update = (b, status) => {
    const patch = { status };
    if (status === "已完成" && !b.completedAt) patch.completedAt = Date.now();
    patchBooking(b.id, patch).catch(() => alert("更新失敗"));
  };
  const counts = useMemo(() => {
    const c = { 全部: all.length, 待確認: 0, 已確認: 0, 前往中: 0, 已完成: 0, 已取消: 0 };
    all.forEach((b) => { c[b.status] = (c[b.status] || 0) + 1; });
    return c;
  }, [all]);
  const list = filter === "全部" ? all : all.filter((b) => b.status === filter);

  return (
    <div>
      <PinSetting currentPin={currentPin} />
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
        {["全部", "待確認", "已確認", "前往中", "已完成", "已取消"].map((f) => (
          <button key={f} onClick={() => setFilter(f)} style={{ padding: "7px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer", border: filter === f ? "1px solid " + C.navy : "1px solid " + C.line, background: filter === f ? C.navy : "#fff", color: filter === f ? "#fff" : C.gray }}>{f} {counts[f] || 0}</button>
        ))}
      </div>

      {list.length === 0 && <div style={{ background: "#fff", borderRadius: 14, padding: 40, textAlign: "center", color: C.gray, border: "1px solid " + C.line }}>目前沒有「{filter}」的行程。</div>}

      {list.map((b) => {
        const s = STATUS[b.status];
        return (
          <div key={b.id} style={{ background: "#fff", borderRadius: 14, padding: 18, marginBottom: 14, border: "1px solid " + C.line, borderLeft: "5px solid " + s.c }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
              <div>
                <div style={{ fontSize: 17, fontWeight: 700, color: C.navy }}>{b.serviceType}　{b.name}</div>
                <a href={"tel:" + b.phone} style={{ fontSize: 14, color: C.sky, textDecoration: "none" }}>📞 {b.phone}</a>
              </div><Badge status={b.status} />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 16px", fontSize: 14, color: C.ink, background: C.bg, borderRadius: 10, padding: "12px 14px", marginBottom: 12 }}>
              <div>🗺️ 桃園機場 ⇄ <b>{b.city}{b.district}</b></div>
              <div>🕐 {b.when.replace("T", " ")}</div>
              {b.addr && <div>📍 {b.addr}</div>}
              {b.flight && <div>✈️ 航班 {b.flight}</div>}
              <div>👤 {b.pax} 人</div>
              {b.note && <div>📝 {b.note}</div>}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
              <div style={{ fontSize: 13, color: C.gray }}>應收車資 <span style={{ fontSize: 22, fontWeight: 800, color: C.orange, marginLeft: 4 }}>{NT(b.price)}</span></div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {b.status === "待確認" && (<>
                  <Btn color={C.green} onClick={() => update(b, "已確認")}>✓ 確認接單</Btn>
                  <Btn color={C.red} ghost onClick={() => update(b, "已取消")}>取消</Btn>
                </>)}
                {b.status === "已確認" && (<>
                  <Btn color={C.orange} onClick={() => update(b, "前往中")}>🚗 通知客人出發中</Btn>
                  <Btn color={C.green} ghost onClick={() => update(b, "已完成")}>完成</Btn>
                  <Btn color={C.red} ghost onClick={() => update(b, "已取消")}>取消</Btn>
                </>)}
                {b.status === "前往中" && (<>
                  <Btn color={C.green} onClick={() => update(b, "已完成")}>✓ 行程完成</Btn>
                  <Btn color={C.red} ghost onClick={() => update(b, "已取消")}>取消</Btn>
                </>)}
                {(b.status === "已完成" || b.status === "已取消") && <Btn color={C.gray} ghost onClick={() => update(b, "待確認")}>↩ 重新開啟</Btn>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ======================== 統計報表 ======================== */
function Donut({ data, colors }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const R = 40, CIRC = 2 * Math.PI * R; let acc = 0;
  return (
    <svg width="160" height="160" viewBox="0 0 160 160">
      <g transform="rotate(-90 80 80)">
        {data.map((d, i) => {
          const len = (d.value / total) * CIRC;
          const seg = <circle key={i} cx="80" cy="80" r={R} fill="none" stroke={colors[i % colors.length]} strokeWidth="22" strokeDasharray={len + " " + (CIRC - len)} strokeDashoffset={-acc} />;
          acc += len; return seg;
        })}
      </g>
    </svg>
  );
}
function CloseoutCard({ co }) {
  const [open, setOpen] = useState(false);
  const cityRows = Object.entries(co.byCity || {}).sort((a, b) => b[1] - a[1]);
  const typeRows = Object.entries(co.byType || {});
  return (
    <div style={{ background: "#fff", border: "1px solid " + C.line, borderRadius: 12, marginBottom: 12, overflow: "hidden" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", textAlign: "left", padding: "14px 16px", background: "#fff", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
        <div>
          <div style={{ fontSize: 15, fontWeight: 800, color: C.navy }}>📅 {fmtDate(co.closedAt)} ・ 整日結算報表</div>
          <div style={{ fontSize: 12, color: C.gray, marginTop: 3 }}>關帳時間 {fmtTime(co.closedAt)}　·　共 {co.count} 筆</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: C.orange }}>{NT(co.revenue)}</div>
          <div style={{ fontSize: 12, color: C.gray }}>{open ? "收合 ▲" : "展開細項 ▼"}</div>
        </div>
      </button>
      {open && (
        <div style={{ padding: "14px 16px 16px", borderTop: "1px solid " + C.line, background: "#fcfdff" }}>
          <div style={{ fontSize: 12.5, color: C.gray, marginBottom: 12 }}>營業時段：{fmtTime(co.openedAt)} ～ {fmtTime(co.closedAt)}</div>
          {(cityRows.length > 0 || typeRows.length > 0) && (
            <div style={{ background: C.bg, borderRadius: 10, padding: "10px 12px", marginBottom: 14, fontSize: 13, lineHeight: 2 }}>
              {cityRows.length > 0 && <div>🗺️ 區域：{cityRows.map(([k, v]) => k + " " + NT(v)).join("　·　")}</div>}
              {typeRows.length > 0 && <div>🚖 類型：{typeRows.map(([k, v]) => k + " " + v + " 筆").join("　·　")}</div>}
            </div>
          )}
          <div style={{ fontSize: 13, fontWeight: 700, color: C.navy, margin: "0 0 8px" }}>每張訂單細項（{(co.trips || []).length} 筆）</div>
          {(co.trips || []).map((t, i) => (
            <div key={t.id || i} style={{ border: "1px solid " + C.line, borderRadius: 10, padding: "10px 12px", marginBottom: 8, background: "#fff" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <b style={{ color: C.navy, fontSize: 14 }}>{t.serviceType}・{t.name}</b>
                <b style={{ color: C.orange }}>{NT(t.price)}</b>
              </div>
              <div style={{ fontSize: 12.5, color: C.gray, lineHeight: 1.8 }}>
                🗺️ 桃園機場 ⇄ {t.city}{t.district}　🕐 {(t.when || "").replace("T", " ")}<br />
                📞 {t.phone}　👤 {t.pax} 人{t.flight ? "　✈️ " + t.flight : ""}
                {t.addr ? <span><br />📍 {t.addr}</span> : null}
                {t.note ? <span><br />📝 {t.note}</span> : null}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
function Stats({ all, closeouts, shiftOpenAt }) {
  const [busy, setBusy] = useState(false);
  const isOpen = !!shiftOpenAt;
  const pool = useMemo(() => all.filter((b) => !b.settledIn), [all]);
  const active = pool.filter((b) => b.status !== "已取消");
  const completed = pool.filter((b) => b.status === "已完成");
  const earned = completed.reduce((s, b) => s + b.price, 0);
  const pending = active.filter((b) => b.status !== "已完成").reduce((s, b) => s + b.price, 0);
  const today = new Date().toISOString().slice(0, 10);
  const todayTrips = pool.filter((b) => (b.when || "").slice(0, 10) === today && b.status !== "已取消");
  const byCity = useMemo(() => {
    const m = {}; active.forEach((b) => { m[b.city] = (m[b.city] || 0) + b.price; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);
  }, [pool]);
  const maxCity = Math.max(1, ...byCity.map((x) => x.value));
  const byType = useMemo(() => {
    const m = { 送機: 0, 接機: 0, 來回: 0 }; active.forEach((b) => { m[b.serviceType] = (m[b.serviceType] || 0) + 1; });
    return Object.entries(m).map(([name, value]) => ({ name, value })).filter((x) => x.value > 0);
  }, [pool]);
  const PIE = [C.orange, C.sky, C.green];
  const metrics = [
    { label: "本班行程", v: active.length, c: C.navy },
    { label: "已完成", v: completed.length, c: C.green },
    { label: "進行中 / 待辦", v: active.filter((b) => b.status !== "已完成").length, c: C.amber },
    { label: "今日行程", v: todayTrips.length, c: C.sky },
  ];

  const openShift = async () => {
    if (busy) return;
    setBusy(true);
    try { await saveShift(Date.now()); } catch (e) { alert("開帳失敗，請檢查網路。"); }
    setBusy(false);
  };
  const closeShift = async () => {
    if (busy) return;
    if (completed.length === 0) {
      if (!window.confirm("本班沒有已完成的行程，仍要關帳嗎？（不會產生日結報表）")) return;
      setBusy(true);
      try { await saveShift(null); } catch (e) { alert("關帳失敗，請檢查網路。"); }
      setBusy(false);
      return;
    }
    if (!window.confirm("確定要關帳結算嗎？\n將結算 " + completed.length + " 筆已完成行程，營收 " + NT(earned) + "。\n結算後這些行程會歸入今日報表。")) return;
    setBusy(true);
    try {
      const trips = completed.map((b) => ({
        id: b.id, name: b.name, phone: b.phone, serviceType: b.serviceType,
        city: b.city, district: b.district, when: b.when, addr: b.addr || "",
        flight: b.flight || "", pax: b.pax || "", note: b.note || "",
        price: b.price || 0, completedAt: b.completedAt || null,
      }));
      const byCityM = {}, byTypeM = {};
      trips.forEach((t) => { byCityM[t.city] = (byCityM[t.city] || 0) + t.price; byTypeM[t.serviceType] = (byTypeM[t.serviceType] || 0) + 1; });
      const cid = await addCloseout({
        openedAt: shiftOpenAt || null, closedAt: Date.now(),
        count: trips.length, revenue: trips.reduce((s, t) => s + t.price, 0),
        trips, byCity: byCityM, byType: byTypeM,
      });
      await Promise.all(completed.map((b) => patchBooking(b.id, { settledIn: cid })));
      await saveShift(null);
    } catch (e) { alert("關帳失敗，請檢查網路後再試。"); }
    setBusy(false);
  };

  return (
    <div>
      <div style={{ background: "#fff", border: "1px solid " + C.line, borderLeft: "5px solid " + (isOpen ? C.green : C.gray), borderRadius: 14, padding: "16px 18px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ width: 10, height: 10, borderRadius: "50%", background: isOpen ? C.green : C.gray, display: "inline-block" }} />
            <b style={{ color: C.navy, fontSize: 16 }}>{isOpen ? "營業中（已開帳）" : "目前已關帳"}</b>
          </div>
          <div style={{ fontSize: 12.5, color: C.gray, marginTop: 4 }}>
            {isOpen ? "開帳時間：" + fmtTime(shiftOpenAt) : "按「開帳」開始新的一班，當天結束後按「關帳」產生整日報表"}
          </div>
        </div>
        {isOpen
          ? <button onClick={closeShift} disabled={busy} style={{ padding: "11px 22px", background: busy ? "#5a6788" : C.red, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: busy ? "not-allowed" : "pointer" }}>{busy ? "處理中…" : "🧾 關帳結算"}</button>
          : <button onClick={openShift} disabled={busy} style={{ padding: "11px 22px", background: busy ? "#5a6788" : C.green, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: busy ? "not-allowed" : "pointer" }}>{busy ? "處理中…" : "🟢 開帳"}</button>}
      </div>

      <div style={{ fontSize: 14, fontWeight: 800, color: C.navy, margin: "0 0 10px" }}>本班即時統計　<span style={{ fontSize: 12, fontWeight: 600, color: C.gray }}>（尚未關帳的行程）</span></div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
        <div style={{ background: C.navy, borderRadius: 14, padding: "18px 20px", color: "#fff" }}>
          <div style={{ fontSize: 13, color: "#aab8d4" }}>已完成營收</div><div style={{ fontSize: 30, fontWeight: 800 }}>{NT(earned)}</div>
        </div>
        <div style={{ background: C.orange, borderRadius: 14, padding: "18px 20px", color: "#fff" }}>
          <div style={{ fontSize: 13, color: "#ffe6c9" }}>預計待收（含進行中）</div><div style={{ fontSize: 30, fontWeight: 800 }}>{NT(pending)}</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 18 }}>
        {metrics.map((m) => (
          <div key={m.label} style={{ background: "#fff", borderRadius: 12, padding: "14px 8px", border: "1px solid " + C.line, textAlign: "center" }}>
            <div style={{ fontSize: 26, fontWeight: 800, color: m.c }}>{m.v}</div><div style={{ fontSize: 12, color: C.gray, marginTop: 2 }}>{m.label}</div>
          </div>
        ))}
      </div>
      <div style={{ background: "#fff", borderRadius: 14, padding: 18, border: "1px solid " + C.line, marginBottom: 16 }}>
        <h4 style={{ margin: "0 0 14px", color: C.navy, fontSize: 15 }}>各區域營收（不含已取消）</h4>
        {byCity.length === 0 ? <Empty /> : byCity.map((c) => (
          <div key={c.name} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
            <div style={{ width: 56, fontSize: 13, color: C.ink, textAlign: "right" }}>{c.name}</div>
            <div style={{ flex: 1, background: C.bg, borderRadius: 6, height: 22, overflow: "hidden" }}>
              <div style={{ width: (c.value / maxCity * 100) + "%", height: "100%", background: C.sky, borderRadius: 6 }} />
            </div>
            <div style={{ width: 84, fontSize: 13, fontWeight: 700, color: C.navy, textAlign: "right" }}>{NT(c.value)}</div>
          </div>
        ))}
      </div>
      <div style={{ background: "#fff", borderRadius: 14, padding: 18, border: "1px solid " + C.line }}>
        <h4 style={{ margin: "0 0 12px", color: C.navy, fontSize: 15 }}>服務類型佔比</h4>
        {byType.length === 0 ? <Empty /> : (
          <div style={{ display: "flex", alignItems: "center", gap: 24, flexWrap: "wrap" }}>
            <Donut data={byType} colors={PIE} />
            <div>{byType.map((e, i) => (
              <div key={e.name} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, fontSize: 14 }}>
                <span style={{ width: 12, height: 12, borderRadius: 3, background: PIE[i % 3], display: "inline-block" }} /><b>{e.name}</b>　{e.value} 筆
              </div>
            ))}</div>
          </div>
        )}
      </div>

      <div style={{ marginTop: 22 }}>
        <h4 style={{ margin: "0 0 12px", color: C.navy, fontSize: 16 }}>📚 歷史日結報表</h4>
        {(!closeouts || closeouts.length === 0)
          ? <div style={{ background: "#fff", borderRadius: 14, padding: 28, textAlign: "center", color: C.gray, border: "1px solid " + C.line, fontSize: 14 }}>尚無關帳紀錄，關帳後會在這裡產生整日報表。</div>
          : closeouts.map((co) => <CloseoutCard key={co.id} co={co} />)}
      </div>
    </div>
  );
}

/* ======================== 主程式 ======================== */
function App() {
  const [tab, setTab] = useState("book");
  const [all, setAll] = useState([]);
  const [closeouts, setCloseouts] = useState([]);
  const [settings, setSettings] = useState({ pin: DEFAULT_PIN });
  const [ready, setReady] = useState(!!window.fb);
  const [err, setErr] = useState(window.fbError || null);
  const [unlocked, setUnlocked] = useState(false);
  const [pin, setPin] = useState("");
  const [pinErr, setPinErr] = useState(false);

  useEffect(() => {
    if (window.fb) { setReady(true); return; }
    const r = () => setReady(true);
    const e = () => setErr(window.fbError || "連線失敗");
    window.addEventListener("fb-ready", r);
    window.addEventListener("fb-error", e);
    return () => { window.removeEventListener("fb-ready", r); window.removeEventListener("fb-error", e); };
  }, []);

  useEffect(() => {
    if (!ready) return;
    const u1 = subBookings(setAll);
    const u2 = subSettings(setSettings);
    const u3 = subCloseouts(setCloseouts);
    return () => { u1 && u1(); u2 && u2(); u3 && u3(); };
  }, [ready]);

  const currentPin = settings.pin || DEFAULT_PIN;
  const tryUnlock = () => { if (pin === currentPin) { setUnlocked(true); setPinErr(false); } else setPinErr(true); };

  const TABS = [
    { k: "book", t: "🚖 乘客訂車" }, { k: "lookup", t: "🔍 查詢訂單" },
    { k: "driver", t: "🧑‍✈️ 司機後台" }, { k: "stats", t: "📊 統計報表" },
  ];

  if (err) {
    return (
      <div style={{ background: C.bg, minHeight: "100vh" }}>
        <div style={{ maxWidth: 620, margin: "0 auto", padding: "60px 20px" }}>
          <div style={{ background: "#fff", border: "1px solid " + C.line, borderRadius: 16, padding: 28 }}>
            <h2 style={{ color: C.navy, marginTop: 0 }}>⚠️ 尚未連上資料庫</h2>
            <p style={{ color: C.ink, fontSize: 15, lineHeight: 1.9 }}>
              系統需要連到 Firebase 才能多司機共用。請打開 <b>index.html</b>，找到最上方的
              <code style={{ background: C.bg, padding: "2px 6px", borderRadius: 4 }}>firebaseConfig</code>
              區塊，把「貼上你的…」六行換成你自己的 Firebase 設定，再重新上傳即可。
            </p>
            <p style={{ color: C.gray, fontSize: 13 }}>錯誤訊息：{String(err)}</p>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.ink }}>
      <div style={{ background: C.navy, padding: "20px 0 0" }}>
        <div style={{ maxWidth: 760, margin: "0 auto", padding: "0 18px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <span style={{ background: C.orange, color: "#fff", fontWeight: 800, padding: "4px 10px", borderRadius: 8, fontSize: 14 }}>✈ TAOYUAN</span>
            <h1 style={{ color: "#fff", fontSize: 22, margin: 0, fontWeight: 800 }}>桃園機場接送・訂車系統</h1>
            <span style={{ fontSize: 11, color: ready ? "#7fd6a0" : "#ffcf8a", border: "1px solid", borderColor: ready ? "#3a6b50" : "#7a5a2a", padding: "2px 8px", borderRadius: 20 }}>{ready ? "● 已連線" : "○ 連線中"}</span>
          </div>
          <p style={{ color: "#aab8d4", fontSize: 13, margin: "6px 0 16px" }}>LINE 客服：@car178　｜　多司機即時共用</p>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {TABS.map((x) => (
              <button key={x.k} onClick={() => setTab(x.k)} style={{ padding: "11px 14px", border: "none", cursor: "pointer", fontSize: 14, fontWeight: 700, borderRadius: "10px 10px 0 0", background: tab === x.k ? C.bg : "transparent", color: tab === x.k ? C.navy : "#cdd6e8" }}>{x.t}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "22px 18px 60px" }}>
        {tab === "book" && <BookingForm />}
        {tab === "lookup" && <Lookup all={all} />}
        {(tab === "driver" || tab === "stats") && !unlocked && (
          <div style={{ background: "#fff", borderRadius: 16, padding: 32, border: "1px solid " + C.line, maxWidth: 360, margin: "20px auto", textAlign: "center" }}>
            <div style={{ fontSize: 34, marginBottom: 6 }}>🔒</div>
            <h3 style={{ margin: "0 0 4px", color: C.navy }}>司機後台</h3>
            <p style={{ color: C.gray, fontSize: 13, margin: "0 0 18px" }}>請輸入司機共用密碼</p>
            <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && tryUnlock()} placeholder="司機密碼" style={{ ...inputStyle, textAlign: "center", letterSpacing: 4, fontSize: 18 }} />
            {pinErr && <p style={{ color: C.red, fontSize: 13, margin: "8px 0 0" }}>密碼錯誤，請再試一次</p>}
            <button onClick={tryUnlock} style={{ marginTop: 14, width: "100%", padding: 12, background: C.navy, color: "#fff", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>進入後台</button>
          </div>
        )}
        {tab === "driver" && unlocked && <Driver all={all} currentPin={currentPin} />}
        {tab === "stats" && unlocked && <Stats all={all} closeouts={closeouts} shiftOpenAt={settings.shiftOpenAt} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
